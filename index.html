<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barakah Cup '26 | Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-btn { background-color: #14532d !important; color: white !important; transform: scale(1.05); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">

    <header class="bg-green-950 text-white py-10 px-4 text-center shadow-2xl border-b-8 border-green-800 relative">
        <h1 class="relative text-4xl font-black tracking-tighter italic uppercase underline decoration-green-500 decoration-4 underline-offset-8">BARAKAH Cup '26</h1>
        <p class="relative mt-4 text-green-400 text-[10px] font-black tracking-[0.3em] uppercase opacity-80">Live Programma & Standen</p>
    </header>

    <nav class="sticky top-0 bg-white/90 backdrop-blur-lg shadow-xl z-50 border-b border-slate-200">
        <div class="flex justify-center space-x-2 p-4">
            <button id="btn-schema" onclick="openTab('schema')" class="active-btn px-5 py-2 rounded-2xl border-2 border-green-900 text-green-950 font-black text-[10px] uppercase transition-all duration-300">Programma</button>
            <button id="btn-standen" onclick="openTab('standen')" class="px-5 py-2 rounded-2xl border-2 border-green-900 text-green-950 font-black text-[10px] uppercase transition-all duration-300">Standen</button>
            <button id="btn-regels" onclick="openTab('regels')" class="px-5 py-2 rounded-2xl border-2 border-green-900 text-green-950 font-black text-[10px] uppercase transition-all duration-300">Regels</button>
        </div>
    </nav>

    <main class="max-w-xl mx-auto p-4 pb-24">
        <section id="schema" class="tab-content active space-y-4">
            <div id="loading" class="text-center py-20 flex flex-col items-center">
                <div class="w-10 h-10 border-4 border-green-800 border-t-transparent rounded-full animate-spin"></div>
                <p id="status-text" class="mt-4 font-black text-slate-400 uppercase text-[10px] tracking-widest">Data laden uit Google Sheets...</p>
            </div>
            <div id="schema-container" class="space-y-4"></div>
        </section>

        <section id="standen" class="tab-content space-y-8">
            <div id="standen-container" class="space-y-8"></div>
        </section>

        <section id="regels" class="tab-content">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-slate-100">
                <h2 class="text-2xl font-black mb-6 uppercase italic text-green-950">Toernooi Regels</h2>
                <div class="space-y-4 text-slate-600 font-bold text-sm">
                    <p class="flex items-center gap-3"><span class="w-2 h-2 bg-green-500 rounded-full"></span> 15 minuten per wedstrijd</p>
                    <p class="flex items-center gap-3"><span class="w-2 h-2 bg-green-500 rounded-full"></span> Winst: 3 pnt | Gelijk: 1 pnt</p>
                    <p class="flex items-center gap-3"><span class="w-2 h-2 bg-green-500 rounded-full"></span> Sortering: Pnt > Saldo > Voor</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        const googleSheetLink = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQeHQmLpsAABDYuMjzT_3GLt9bquZ7y4fbFI6PWKeZK4HjGtPGoFzYU24tDyf82HngtMwpqbZ5lofng/pub?output=csv";

        async function fetchData() {
            const loadingEl = document.getElementById('loading');
            const statusText = document.getElementById('status-text');
            
            try {
                const response = await fetch(googleSheetLink + "&cache=" + Date.now());
                if (!response.ok) throw new Error('Netwerkfout');
                
                const text = await response.text();
                const rows = text.split('\n')
                    .filter(r => r.trim() !== '')
                    .map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim()));

                // Zoek rijen voor schema (bevat een tijdstip zoals 10:00)
                const schemaRows = rows.filter(r => r.some(cell => cell.includes(':')) || r.some(cell => cell === "-"));
                
                // Zoek rijen voor standen (bevat A, B of C EN cijfers voor punten)
                const standenRows = rows.filter(r => 
                    (r.includes("A") || r.includes("B") || r.includes("C")) && 
                    r.some(cell => !isNaN(cell) && cell !== "" && cell.length < 4)
                );

                if (schemaRows.length > 0 || standenRows.length > 0) {
                    renderSchema(schemaRows);
                    renderStanden(standenRows);
                    loadingEl.style.display = 'none';
                } else {
                    statusText.innerHTML = "⚠️ Verbonden, maar geen data herkend.<br>Check of je 'Hele document' hebt gepubliceerd.";
                }
            } catch (err) {
                statusText.innerHTML = "❌ Fout: " + err.message;
            }
        }

        function renderSchema(rows) {
            const container = document.getElementById('schema-container');
            container.innerHTML = '';
            rows.forEach(cols => {
                // We zoeken de posities dynamisch
                const tijd = cols.find(c => c.includes(':')) || "--:--";
                const isPauze = cols.some(c => c === "-");
                const scoreIndex = cols.findIndex(c => !isNaN(c) && c !== "" && cols.indexOf(c) > 3);
                
                if (isPauze) {
                    const info = cols.find(c => c.length > 5 && !c.includes(':')) || "Pauze";
                    container.innerHTML += `
                        <div class="bg-amber-400 p-4 rounded-3xl text-center shadow-lg">
                            <span class="block text-[9px] font-black text-amber-900 uppercase tracking-widest mb-1">Pauze / Info</span>
                            <span class="text-lg font-black text-white uppercase italic">${info}</span>
                            <span class="block text-[10px] font-bold text-amber-800 mt-1">${tijd}</span>
                        </div>`;
                } else {
                    // Pak teamnamen (meestal kolom D en E bij index 3 en 4)
                    const teamA = cols[3] || "Team A";
                    const teamB = cols[4] || "Team B";
                    const sA = cols[5] || "0";
                    const sB = cols[6] || "0";
                    const veld = cols[1] || "?";
                    const type = cols[2] || "Poule";

                    container.innerHTML += `
                        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-100 border-b-4 border-b-slate-200">
                            <div class="flex justify-between text-[10px] font-black text-slate-300 uppercase mb-4 tracking-widest">
                                <span>Veld ${veld} • ${type}</span>
                                <span>${tijd}</span>
                            </div>
                            <div class="flex justify-between items-center gap-2">
                                <span class="w-[38%] text-[11px] font-black text-slate-800 uppercase italic leading-tight">${teamA}</span>
                                <div class="w-[24%] bg-green-950 text-green-400 rounded-2xl py-2 text-center font-black shadow-2xl text-base border-b-2 border-green-700">
                                    ${sA}:${sB}
                                </div>
                                <span class="w-[38%] text-right text-[11px] font-black text-slate-800 uppercase italic leading-tight">${teamB}</span>
                            </div>
                        </div>`;
                }
            });
        }

        function renderStanden(rows) {
            const container = document.getElementById('standen-container');
            container.innerHTML = '';
            ["A", "B", "C"].forEach(p => {
                // Filter rijen die de poule-letter bevatten (vaak in kolom L/index 11)
                const teams = rows.filter(r => r.some(cell => cell === p));
                if (teams.length === 0) return;

                let html = `
                    <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100">
                        <div class="bg-green-950 text-white px-8 py-4 font-black italic uppercase text-xs tracking-widest">Poule ${p}</div>
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 text-[9px] font-black text-slate-400 uppercase italic tracking-widest">
                                    <th class="px-6 py-4">Team</th>
                                    <th class="px-4 py-4 text-center">G</th>
                                    <th class="px-4 py-4 text-center">DS</th>
                                    <th class="px-6 py-4 text-center text-slate-900">Pnt</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100">`;

                teams.forEach(r => {
                    // Voor de gesorteerde tabel (L t/m U):
                    // Poule=index 11, Team=12, G=13, DS=19, Pnt=20
                    const team = r[12] || "Team";
                    const g = r[13] || "0";
                    const ds = r[19] || "0";
                    const pnt = r[20] || "0";

                    html += `
                        <tr class="hover:bg-green-50/30 transition-all duration-300 text-[11px]">
                            <td class="px-6 py-4 font-black text-slate-800 uppercase italic">${team}</td>
                            <td class="px-4 py-4 text-center text-slate-400 font-bold">${g}</td>
                            <td class="px-4 py-4 text-center text-slate-400 font-bold">${ds}</td>
                            <td class="px-6 py-4 text-center font-black text-green-700 bg-green-50/50">${pnt}</td>
                        </tr>`;
                });
                container.innerHTML += html + `</tbody></table></div>`;
            });
        }

        function openTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-btn'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active-btn');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        fetchData();
        setInterval(fetchData, 30000);
    </script>
</body>
</html>
