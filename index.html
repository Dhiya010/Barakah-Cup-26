<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barakah Cup '26 | Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --barakah-purple: #4a244d; 
            --barakah-gold: #c5a367;   
            --barakah-green: #22c55e;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #fcfaf7; 
            color: var(--barakah-purple);
            -webkit-tap-highlight-color: transparent;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .active-btn { 
            background-color: var(--barakah-purple) !important; 
            color: var(--barakah-gold) !important; 
            border-color: var(--barakah-gold) !important;
            box-shadow: 0 4px 15px rgba(74, 36, 77, 0.3);
        }

        .gold-border { border-color: var(--barakah-gold); }
        .purple-bg { background-color: var(--barakah-purple); }
        .gold-text { color: var(--barakah-gold); }

        #lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }
        #lightbox img { max-width: 95%; max-height: 90%; object-fit: contain; }
        .info-card li { position: relative; padding-left: 1.5rem; margin-bottom: 0.75rem; }
        .info-card li::before { content: "•"; position: absolute; left: 0; color: var(--barakah-gold); font-weight: bold; }
    </style>
</head>
<body>

    <div id="lightbox" onclick="this.style.display='none'">
        <img src="plattegrond.png" alt="Vergrote plattegrond">
        <div class="absolute top-5 right-5 text-white font-black text-xl">✕</div>
    </div>

    <header class="purple-bg text-white py-10 px-4 text-center border-b-4 gold-border shadow-2xl relative overflow-hidden">
        <div class="absolute inset-0 opacity-5 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
        <div class="relative flex flex-col items-center">
            <img src="logo.png" alt="Barakah Cup Logo" class="w-28 h-28 mb-4 object-contain drop-shadow-lg">
            <h1 class="text-3xl font-black italic uppercase tracking-widest gold-text">BARAKAH CUP '26</h1>
            
            <div class="flex space-x-4 mt-6">
                <a href="https://www.instagram.com/barakahcup/" target="_blank" class="p-2.5 rounded-full border-2 gold-border shadow-lg bg-gradient-to-tr from-[#f9ce34] via-[#ee2a7b] to-[#6228d7]">
                    <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
                </a>
            </div>
        </div>
    </header>

    <nav class="sticky top-0 bg-white/95 backdrop-blur-md shadow-lg z-50 border-b gold-border/20">
        <div class="flex justify-center space-x-2 p-4">
            <button id="btn-schema" onclick="openTab('schema')" class="active-btn px-4 py-2.5 rounded-xl border-2 border-slate-200 text-slate-500 font-black text-[10px] uppercase transition-all duration-300">Programma</button>
            <button id="btn-standen" onclick="openTab('standen')" class="px-4 py-2.5 rounded-xl border-2 border-slate-200 text-slate-500 font-black text-[10px] uppercase transition-all duration-300">Standen</button>
            <button id="btn-info" onclick="openTab('info')" class="px-4 py-2.5 rounded-xl border-2 border-slate-200 text-slate-500 font-black text-[10px] uppercase transition-all duration-300">Toernooi Info</button>
        </div>
    </nav>

    <main class="max-w-xl mx-auto p-4 pb-24">
        <div id="status-message" class="text-center py-10 font-bold text-slate-400 uppercase text-[10px] tracking-widest">Live Update...</div>
        
        <section id="schema" class="tab-content active space-y-4"></section>
        <section id="standen" class="tab-content space-y-8"></section>

        <section id="info" class="tab-content space-y-6">
            <div class="bg-white p-2 rounded-[2.5rem] shadow-xl border border-slate-100 overflow-hidden">
                <h2 class="text-xl font-black italic uppercase gold-text my-4 tracking-tighter text-center">Locatie Plattegrond</h2>
                <div class="cursor-zoom-in" onclick="document.getElementById('lightbox').style.display='flex'">
                    <img src="plattegrond.png" alt="Plattegrond" class="w-full h-auto rounded-3xl">
                </div>
            </div>
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-100 info-card">
                <h2 class="text-xl font-black italic uppercase gold-text mb-4 tracking-tighter">Wedstrijdreglement</h2>
                <ul class="text-[13px] font-bold text-slate-600">
                    <li>7 tegen 7 (6 spelers en 1 keeper).</li>
                    <li>Wedstrijdduur: 20 minuten.</li>
                    <li>Geel = 3 min tijdstraf. Rood = Veld verlaten.</li>
                    <li class="text-red-600">3 min te laat = 1-0 achterstand!</li>
                </ul>
            </div>
        </section>
    </main>

    <script>
        const schemaCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQeHQmLpsAABDYuMjzT_3GLt9bquZ7y4fbFI6PWKeZK4HjGtPGoFzYU24tDyf82HngtMwpqbZ5lofng/pub?gid=1773508172&single=true&output=csv";
        const standenCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQeHQmLpsAABDYuMjzT_3GLt9bquZ7y4fbFI6PWKeZK4HjGtPGoFzYU24tDyf82HngtMwpqbZ5lofng/pub?gid=100335345&single=true&output=csv";

        async function fetchSource(url) {
            const response = await fetch(url + `&t=${Date.now()}`);
            if (!response.ok) throw new Error('Netwerkfout');
            return await response.text();
        }

        function parseCSV(text) {
            return text.split('\n').filter(r => r.trim() !== '').map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim()));
        }

        function renderSchema(rows) {
            const container = document.getElementById('schema');
            let html = '';
            const matches = rows.filter(r => r[0] && r[0].includes(':'));
            
            matches.forEach(cols => {
                const [tijd, veld, type, teamA, teamB, sA, sB, pauze] = cols;
                if (pauze === "-") {
                    html += `<div class="bg-gradient-to-r from-[#4a244d] to-[#633268] p-6 rounded-[2rem] text-center shadow-lg border-2 gold-border text-white uppercase italic font-black">${type} <span class="block text-[10px] gold-text">${tijd}</span></div>`;
                } else {
                    html += `
                        <div class="bg-white p-5 rounded-[2.2rem] shadow-sm border border-slate-100">
                            <div class="flex justify-between text-[10px] font-black uppercase mb-3 text-slate-400 italic"><span>Veld ${veld} • ${type}</span><span>${tijd}</span></div>
                            <div class="flex justify-between items-center">
                                <span class="w-[40%] text-xs font-black uppercase italic">${teamA}</span>
                                <div class="bg-[#4a244d] text-[#c5a367] px-3 py-1 rounded-xl font-black text-sm min-w-[60px] text-center">${sA || '-'}:${sB || '-'}</div>
                                <span class="w-[40%] text-right text-xs font-black uppercase italic">${teamB}</span>
                            </div>
                        </div>`;
                }
            });
            container.innerHTML = html;
        }

        function renderStanden(rows) {
            const container = document.getElementById('standen');
            let html = '';
            ["A", "B", "C"].forEach(poule => {
                // HIER GEBEURT HET FILTEREN: Alleen exact A, B of C en geen lege namen
                const teams = rows.filter(r => r[11] === poule && r[12] && r[12].length > 1);
                if (teams.length === 0) return;

                html += `
                    <div class="bg-white rounded-[2rem] shadow-xl overflow-hidden mb-6 border border-slate-100">
                        <div class="purple-bg text-[#c5a367] px-6 py-4 font-black italic uppercase text-xs border-b-2 gold-border flex justify-between">Poule ${poule} <span class="text-[8px] opacity-50">Swipe →</span></div>
                        <div class="overflow-x-auto"><table class="w-full text-left text-[11px] italic font-bold">
                            <thead class="bg-slate-50 text-slate-400 uppercase text-[9px]">
                                <tr><th class="px-4 py-3 sticky left-0 bg-slate-50">Team</th><th class="px-2 text-center">Pnt</th><th class="px-2 text-center">+/-</th></tr>
                            </thead>
                            <tbody class="divide-y divide-slate-50">`;
                
                teams.forEach(r => {
                    html += `<tr>
                        <td class="px-4 py-4 uppercase font-black sticky left-0 bg-white border-r border-slate-50">${r[12]}</td>
                        <td class="px-2 text-center font-black text-[#4a244d] bg-amber-50">${r[20] || 0}</td>
                        <td class="px-2 text-center text-slate-400">${r[19] || 0}</td>
                    </tr>`;
                });
                html += `</tbody></table></div></div>`;
            });
            container.innerHTML = html;
        }

        function openTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-btn'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active-btn');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function init() {
            try {
                const [sText, stText] = await Promise.all([fetchSource(schemaCsvUrl), fetchSource(standenCsvUrl)]);
                renderSchema(parseCSV(sText));
                renderStanden(parseCSV(stText));
                document.getElementById('status-message').style.display = 'none';
            } catch (e) { console.error(e); }
        }

        init();
        setInterval(init, 20000);
    </script>
</body>
</html>
