<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barakah Cup '26 | Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-btn { background-color: #14532d !important; color: white !important; transform: scale(1.05); shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">

    <header class="bg-green-950 text-white py-12 px-4 text-center shadow-2xl border-b-8 border-green-800 relative">
        <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
        <h1 class="relative text-5xl font-black tracking-tighter italic uppercase underline decoration-green-500 decoration-4 underline-offset-8">BARAKAH CUP '26</h1>
        <p class="relative mt-4 text-green-400 text-xs font-black tracking-[0.3em] uppercase opacity-80">Live Programma & Standen</p>
    </header>

    <nav class="sticky top-0 bg-white/90 backdrop-blur-lg shadow-xl z-50 border-b border-slate-200">
        <div class="flex justify-center space-x-2 p-4">
            <button id="btn-schema" onclick="openTab('schema')" class="active-btn px-6 py-2.5 rounded-2xl border-2 border-green-900 text-green-950 font-black text-[10px] uppercase transition-all duration-300">Schema</button>
            <button id="btn-standen" onclick="openTab('standen')" class="px-6 py-2.5 rounded-2xl border-2 border-green-900 text-green-950 font-black text-[10px] uppercase transition-all duration-300">Standen</button>
            <button id="btn-regels" onclick="openTab('regels')" class="px-6 py-2.5 rounded-2xl border-2 border-green-900 text-green-950 font-black text-[10px] uppercase transition-all duration-300">Regels</button>
        </div>
    </nav>

    <main class="max-w-xl mx-auto p-4 pb-24">

        <section id="schema" class="tab-content active space-y-4">
            <div id="loading" class="text-center py-20 flex flex-col items-center">
                <div class="w-10 h-10 border-4 border-green-800 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-4 font-black text-slate-400 uppercase text-[10px] tracking-widest">Verbinden met Google Sheets...</p>
            </div>
            <div id="schema-container" class="space-y-4"></div>
        </section>

        <section id="standen" class="tab-content space-y-8">
            <div id="standen-container" class="space-y-8"></div>
        </section>

        <section id="regels" class="tab-content">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-slate-100">
                <h2 class="text-2xl font-black mb-6 uppercase italic text-green-950">Toernooi Regels</h2>
                <div class="space-y-6 text-slate-600 font-bold text-sm italic">
                    <p class="flex items-center gap-3"><span class="w-2 h-2 bg-green-500 rounded-full"></span> Wedstrijdduur: 15 minuten</p>
                    <p class="flex items-center gap-3"><span class="w-2 h-2 bg-green-500 rounded-full"></span> Winst: 3 pnt | Gelijk: 1 pnt</p>
                    <p class="flex items-center gap-3"><span class="w-2 h-2 bg-green-500 rounded-full"></span> Sortering: Punten > Saldo > Voor</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        const googleSheetLink = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQeHQmLpsAABDYuMjzT_3GLt9bquZ7y4fbFI6PWKeZK4HjGtPGoFzYU24tDyf82HngtMwpqbZ5lofng/pub?output=csv";

        async function fetchData() {
            try {
                // Directe fetch zonder proxy om CORS-fouten te vermijden
                const response = await fetch(googleSheetLink + "&cache=" + Date.now());
                if (!response.ok) throw new Error('Kon geen verbinding maken');
                
                const text = await response.text();
                const rows = text.split('\n').filter(r => r.trim() !== '').map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));

                // SCHEMA (Filter op tijd in kolom A of pauze in veld-kolom B)
                const schemaRows = rows.filter(r => r[0] && (r[0].includes(':') || r[1].trim() === "-"));
                
                // STANDEN (Filter op Poule A, B of C in de SORTEER-kolom L = index 11)
                const standenRows = rows.filter(r => r[11] && ["A", "B", "C"].includes(r[11].trim()));

                renderSchema(schemaRows);
                renderStanden(standenRows);
                document.getElementById('loading').style.display = 'none';
            } catch (err) {
                console.error("Fetch Error:", err);
                document.getElementById('loading').innerHTML = `<p class="text-red-500 font-black uppercase text-xs">⚠️ Fout bij laden: Check internetverbinding</p>`;
            }
        }

        function renderSchema(rows) {
            const container = document.getElementById('schema-container');
            container.innerHTML = '';
            rows.forEach(cols => {
                const [tijd, veld, type, teamA, teamB, sA, sB] = cols.map(c => c ? c.replace(/"/g, '').trim() : "");
                
                if (veld === "-") {
                    container.innerHTML += `
                        <div class="bg-amber-400 p-4 rounded-3xl text-center shadow-lg transform -rotate-1">
                            <span class="block text-[9px] font-black text-amber-900 uppercase tracking-[0.2em] mb-1">Pauze / Gebed</span>
                            <span class="text-lg font-black text-white uppercase italic">${teamA}</span>
                            <span class="block text-[10px] font-bold text-amber-800 mt-1">${tijd}</span>
                        </div>`;
                } else {
                    container.innerHTML += `
                        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-100 border-b-4 border-b-slate-200">
                            <div class="flex justify-between text-[10px] font-black text-slate-300 uppercase mb-4 tracking-widest">
                                <span>Veld ${veld} • ${type}</span>
                                <span>${tijd}</span>
                            </div>
                            <div class="flex justify-between items-center gap-4">
                                <span class="w-[38%] text-xs font-black text-slate-800 uppercase italic leading-tight">${teamA}</span>
                                <div class="w-[24%] bg-green-950 text-green-400 rounded-2xl py-3 text-center font-black shadow-2xl text-lg border-b-2 border-green-700">
                                    ${sA || 0}<span class="text-white mx-1 opacity-30">:</span>${sB || 0}
                                </div>
                                <span class="w-[38%] text-right text-xs font-black text-slate-800 uppercase italic leading-tight">${teamB}</span>
                            </div>
                        </div>`;
                }
            });
        }

        function renderStanden(rows) {
            const container = document.getElementById('standen-container');
            container.innerHTML = '';
            ["A", "B", "C"].forEach(poule => {
                const teams = rows.filter(r => r[11].trim() === poule);
                if (teams.length === 0) return;

                let html = `
                    <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100">
                        <div class="bg-green-950 text-white px-8 py-5 font-black italic uppercase text-xs tracking-[0.2em]">Poule ${poule}</div>
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 text-[9px] font-black text-slate-400 uppercase italic tracking-widest">
                                    <th class="px-8 py-4">Team</th>
                                    <th class="px-4 py-4 text-center">G</th>
                                    <th class="px-4 py-4 text-center">DS</th>
                                    <th class="px-8 py-4 text-center text-slate-900">Pnt</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100">`;

                teams.forEach(cols => {
                    // Mapping L(11) t/m U(20)
                    const team = cols[12] || "Team";
                    const g = cols[13] || "0";
                    const ds = cols[19] || "0";
                    const pnt = cols[20] || "0";

                    html += `
                        <tr class="hover:bg-green-50/30 transition-all duration-300">
                            <td class="px-8 py-5 font-black text-slate-800 text-xs uppercase italic truncate max-w-[120px]">${team}</td>
                            <td class="px-4 py-5 text-center text-slate-400 font-bold text-xs">${g}</td>
                            <td class="px-4 py-5 text-center text-slate-400 font-bold text-xs">${ds}</td>
                            <td class="px-8 py-5 text-center font-black text-green-700 bg-green-50/50 text-sm">${pnt}</td>
                        </tr>`;
                });
                container.innerHTML += html + `</tbody></table></div>`;
            });
        }

        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-btn'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active-btn');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        fetchData();
        setInterval(fetchData, 30000);
    </script>
</body>
</html>
